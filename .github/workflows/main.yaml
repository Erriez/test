# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main", "staging/erriez/*" ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ "main", "staging/erriez/*" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Get tag
        id: tag
        uses: Erriez/action-get-tag@v1.0.1
        with:
          strip_v: true # Remove v character from version
          default: v0.0.0 # Default version when tag not found

      - name: Get Git tag
        run:
          echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          echo $RELEASE_VERSION

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'
          cache: 'pip'
          cache-dependency-path: |
            **/requirements*.txt

      - name: Save version.txt
        run: |
          echo "${{steps.tag.outputs.tag}}" > data/version.txt
          echo "Contents data/version.txt:"
          cat data/version.txt

      - name: Save website.url
        run: |
          echo "[InternetShortcut]" > website.url
          echo "URL=${{github.server_url}}/${{github.repository}}" >> website.url
          cat website.url

      - name: Build Windows executable
        run: |
          pip install pyinstaller
          pyinstaller --onefile --noconsole --distpath . --name erriez-test test.py

      - name: Create Windows NSIS installer
        uses: joncloud/makensis-action@v4.1
        with:
          script-file: "nsis/install.nsi"
          arguments: "/V4 /DVERSION=${{steps.tag.outputs.tag}}"

      - name: Create executable hashes
        run: |
          sha1sum erriez-test.exe > erriez-test.exe.sha1
          sha1sum erriez-test-setup-v${{steps.tag.outputs.tag}}.exe > erriez-test-setup-v${{steps.tag.outputs.tag}}.exe.sha1
          cat erriez-test.exe.sha1
          cat erriez-test-setup-v${{steps.tag.outputs.tag}}.exe.sha1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: erriez-test-windows-b${{github.run_number}}
          if-no-files-found: error
          path: |
            LICENSE
            website.url
            erriez-test.exe
            erriez-test.exe.sha1
            erriez-test-setup-v${{steps.tag.outputs.tag}}.exe
            erriez-test-setup-v${{steps.tag.outputs.tag}}.exe.sha1


  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Check-out repository
        uses: actions/checkout@v4

      - name: Get tag
        id: tag
        uses: Erriez/action-get-tag@v1.0.1
        with:
          strip_v: true # Remove v character from version
          default: v0.0.0 # Default version when tag not found

      - name: Get Git tag
        run:
          echo $GITHUB_REF_NAME

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'
          cache: 'pip'
          cache-dependency-path: |
            **/requirements*.txt

      - name: Save version.txt
        run: |
          echo "${{steps.tag.outputs.tag}}" > data/version.txt
          echo "Contents data/version.txt:"
          cat data/version.txt

      - name: Save website.url
        run: |
          echo "[InternetShortcut]" > website.url
          echo "URL=${{github.server_url}}/${{github.repository}}" >> website.url
          cat website.url

      - name: Build Linux executable
        run: |
          pip install pyinstaller
          pyinstaller --onefile --distpath . --name erriez-test-linux test.py

      - name: Create Linux installer
        run: |
          # Install Linux system dependencies
          sudo apt install makeself
          
          # Copy executable to installer directory
          cp erriez-test-linux installer-linux/program/erriez-test

          # Create Linux installer
          OUTPUT_FILE=erriez-test-linux.run
          installer-linux/create_linux_installer.sh ${OUTPUT_FILE}

          # Check if file exists
          if [ ! -f "$OUTPUT_FILE" ]; then
            echo "OUTPUT_FILE does not exist."
            exit 1
          fi

      - name: Create executable hashes
        run: |
          sha1sum erriez-test-linux > erriez-test-linux.sha1
          sha1sum erriez-test-linux.run > erriez-test-linux.run.sha1
          cat erriez-test-linux.sha1
          cat erriez-test-linux.run.sha1

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: erriez-test-linux-b${{github.run_number}}
          if-no-files-found: error
          path: |
            LICENSE
            website.url
            erriez-test-linux
            erriez-test-linux.sha1
            erriez-test-linux.run
            erriez-test-linux.run.sha1
